name: Publish to PyPI 🚀

on:
  release:
    types: [published] # Triggers automatically when you publish a new release on GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Frontend Dependencies & Build UI
      run: |
        cd frontend
        npm ci
        npm run build
        cd ..

    - name: Install Python Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build Python Package (Wheel & Tarball)
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/github-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
